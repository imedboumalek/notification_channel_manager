name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pub.dev
    permissions:
      id-token: write # required for authentication to pub.dev via OIDC
    steps:
      - uses: actions/checkout@v4

      # Exchanges the GitHub OIDC token for a temporary pub.dev credential.
      - uses: dart-lang/setup-dart@v1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Dry-run publish
        run: flutter pub publish --dry-run

      - name: Publish
        run: flutter pub publish --force
